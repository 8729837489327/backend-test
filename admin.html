<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Customize Your Linktree</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Panel</h1>
            <a href="/" class="back-link">← Back to site</a>
        </header>
        
        <div class="section">
            <h2>Profile Settings</h2>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your Name">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" placeholder="Your bio goes here"></textarea>
            </div>
            <div class="form-group">
                <label for="profileImage">Profile Image URL</label>
                <input type="text" id="profileImage" placeholder="https://example.com/image.jpg">
            </div>
        </div>
        
        <div class="section">
            <h2>Links</h2>
            <div id="linksEditor">
                <!-- Link items will be added here -->
            </div>
            <button id="addLinkBtn" class="btn btn-secondary">+ Add Link</button>
        </div>
        
        <div class="section">
            <h2>Appearance</h2>
            <div class="form-group">
                <label for="bgColor">Background Color</label>
                <input type="color" id="bgColor" value="#1a1a2e">
            </div>
            <div class="form-group">
                <label for="textColor">Text Color</label>
                <input type="color" id="textColor" value="#ffffff">
            </div>
            <div class="form-group">
                <label for="accentColor">Accent Color</label>
                <input type="color" id="accentColor" value="#6c5ce7">
            </div>
        </div>
        
        <div class="actions">
            <button id="saveBtn" class="btn btn-primary">Save Changes</button>
            <button id="previewBtn" class="btn btn-secondary">Preview</button>
        </div>
        
        <div id="statusMessage" class="status-message"></div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
